<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nevoirs • RedirectMap Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06030d;
  --glass: rgba(255,255,255,.08);
  --line: rgba(255,214,247,.18);
  --pink: #ff7ac8;
  --cyan: #69e7ff;
  --violet: #aa88ff;
  --green: #48ffa0;
  --red: #ff5371;
  --txt: #fff8ff;
  --muted: rgba(255,248,255,.6);
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Space Grotesk', system_ui, sans-serif;
  background: linear-gradient(145deg, #06030d, #10071f);
  color: var(--txt);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 860px;
  margin: 0 auto;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logoOrb {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  display: grid;
  place-items: center;
  font-weight: 900;
  font-size: 22px;
  color: white;
  box-shadow: 0 0 30px rgba(255,122,200,.3);
}
h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -.02em;
}
.tokenBar {
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--glass);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
}
.tokenBar input {
  background: transparent;
  border: none;
  color: var(--txt);
  font-family: 'JetBrains Mono', monospace;
  width: 260px;
  outline: none;
}
.card {
  background: var(--glass);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,.3);
}
.sectionTitle {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.inputRow {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.inputRow input {
  flex: 1;
  min-width: 140px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 15px;
  outline: none;
}
.inputRow input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(105,231,255,.1);
}

/* Mobile responsive */
@media (max-width: 480px) {
  body { padding: 12px; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .tokenBar { width: 100%; flex-wrap: wrap; }
  .tokenBar input { width: 100%; margin-top: 6px; }
  .inputRow { flex-direction: column; }
  .inputRow input { width: 100%; }
  .card { padding: 16px; }
  .keyItem { flex-direction: column; align-items: flex-start; gap: 12px; }
  .keyActions { width: 100%; justify-content: flex-end; }
}
button {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s ease;
  border: none;
}
.btn {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  color: white;
  padding: 12px 22px;
  border-radius: 14px;
  font-size: 15px;
  box-shadow: 0 4px 20px rgba(255,122,200,.25);
}
.btn:hover { transform: translateY(-1px); }
.btn.secondary {
  background: rgba(255,255,255,.08);
  color: var(--txt);
  border: 1px solid var(--line);
}
.btn.danger {
  background: rgba(255,83,113,.15);
  color: #ffd1db;
  border: 1px solid rgba(255,83,113,.3);
}
.keyList {
  display: grid;
  gap: 8px;
}
.keyItem {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px 18px;
  transition: all .1s ease;
}
.keyItem:hover {
  border-color: var(--cyan);
  background: rgba(105,231,255,.06);
}
.keyInfo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.key {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  font-size: 16px;
  color: var(--cyan);
}
.domain {
  font-size: 13px;
  color: var(--muted);
  word-break: break-all;
}
.keyActions {
  display: flex;
  gap: 8px;
}
.keyActions button {
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
}
.emptyState {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: white;
  padding: 14px 24px;
  border-radius: 999px;
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
  display: none;
  align-items: center;
  gap: 10px;
  z-index: 9999;
  font-weight: 600;
}
.toast.show { display: flex; }
.toast.success { background: #0f2a1f; color: #48ffa0; }
.toast.error { background: #2a1218; color: #ff5371; }
.modal {
  position: fixed;
  inset: 0;
  background: rgba(6,3,13,.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}
.modal.open { display: flex; }
.modalContent {
  background: #10071f;
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modalContent h3 {
  margin-bottom: 16px;
  font-size: 20px;
}
.modalContent input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 15px;
  margin-bottom: 16px;
}
.modalActions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.searchBar {
  margin-bottom: 16px;
}
.searchBar input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  padding: 14px 18px;
  border-radius: 999px;
  color: var(--txt);
  font-size: 15px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logoOrb">N</div>
      <div>
        <h1>RedirectMap</h1>
        <div style="font-size:13px;color:var(--muted);margin-top:-4px;">Nevoirs • GitHub Editor</div>
      </div>
    </div>
    <div class="tokenBar">
      <span style="color:var(--muted);font-size:12px;">Token</span>
      <input id="tokenInput" type="password" value="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" placeholder="GitHub Token">
      <button onclick="saveToken()" class="btn secondary" style="padding:8px 16px;font-size:13px;">Lưu</button>
    </div>
  </div>

  <div class="card">
    <div class="sectionTitle">Thêm key mới</div>
    <div class="inputRow">
      <input id="newKey" placeholder="Key (ví dụ: 127 hoặc 216-2)" style="flex:0.6">
      <input id="newDomain" placeholder="Domain hoặc URL (nerland.co hoặc https://...)" style="flex:1.4">
      <button onclick="addNewKey()" class="btn">+ Thêm</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="sectionTitle" style="margin:0;">Danh sách key hiện có</div>
      <button onclick="loadRepo(true)" class="btn secondary" style="padding:8px 18px;font-size:13px;">↻ Reload</button>
    </div>

    <div class="searchBar">
      <input id="searchInput" placeholder="Tìm theo key hoặc domain..." oninput="filterKeys()">
    </div>

    <div id="keyList" class="keyList"></div>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modalContent">
    <h3>Chỉnh sửa key <span id="editKeyName" style="color:var(--cyan)"></span></h3>
    <input id="editDomainInput" placeholder="Domain mới">
    <div class="modalActions">
      <button onclick="closeEditModal()" class="btn secondary">Hủy</button>
      <button onclick="saveEdit()" class="btn">Lưu thay đổi</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ==================== CONFIG ====================
const GITHUB_OWNER = "eystearisdown";
const GITHUB_REPO  = "private-shii";
const GITHUB_PATH  = "redirectMap.json";

let currentData = null;
let currentSha = null;
let allKeys = [];

// ==================== UTIL ====================
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => {
    t.classList.remove("show");
  }, 2400);
}

function getHeaders(token) {
  return {
    "Authorization": `Bearer ${token}`,
    "Content-Type": "application/json",
    "Accept": "application/vnd.github.v3+json"
  };
}

async function loadRepo(showToastMsg = false) {
  const token = document.getElementById("tokenInput").value.trim();
  if (!token) {
    showToast("Thiếu GitHub token", "error");
    return;
  }

  try {
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}?t=${Date.now()}`;
    const res = await fetch(url, { headers: getHeaders(token) });

    if (!res.ok) throw new Error("Không load được repo");

    const json = await res.json();
    currentSha = json.sha;

    const content = atob(json.content.replace(/\n/g, ""));
    currentData = JSON.parse(content);
    currentData.redirects = currentData.redirects || {};

    allKeys = Object.keys(currentData.redirects).sort((a,b) => {
      const na = parseInt(a), nb = parseInt(b);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      return a.localeCompare(b);
    });

    renderKeyList(allKeys);
    if (showToastMsg) showToast("Đã tải lại redirectMap");
  } catch (e) {
    console.error(e);
    showToast("Lỗi khi tải repo. Kiểm tra token hoặc quyền.", "error");
  }
}

function renderKeyList(keysToShow) {
  const container = document.getElementById("keyList");
  container.innerHTML = "";

  if (!keysToShow || keysToShow.length === 0) {
    container.innerHTML = `<div class="emptyState">Chưa có key nào trong redirectMap.json</div>`;
    return;
  }

  keysToShow.forEach(key => {
    const domain = currentData.redirects[key] || "";
    const item = document.createElement("div");
    item.className = "keyItem";
    item.innerHTML = `
      <div class="keyInfo">
        <div class="key">${key}</div>
        <div class="domain">${domain || "<i>chưa có domain</i>"}</div>
      </div>
      <div class="keyActions">
        <button onclick="editKey('${key}')" class="btn secondary" style="padding:8px 16px;font-size:13px;">Sửa</button>
        <button onclick="deleteKey('${key}')" class="btn danger" style="padding:8px 16px;font-size:13px;">Xoá</button>
      </div>
    `;
    container.appendChild(item);
  });
}

function filterKeys() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) {
    renderKeyList(allKeys);
    return;
  }
  const filtered = allKeys.filter(k => {
    const d = (currentData.redirects[k] || "").toLowerCase();
    return k.toLowerCase().includes(q) || d.includes(q);
  });
  renderKeyList(filtered);
}

async function addNewKey() {
  const key = document.getElementById("newKey").value.trim();
  const domain = document.getElementById("newDomain").value.trim();

  if (!key || !domain) {
    showToast("Cần nhập cả Key và Domain", "error");
    return;
  }

  const token = document.getElementById("tokenInput").value.trim();
  if (!token || !currentData) {
    showToast("Chưa load repo", "error");
    return;
  }

  currentData.redirects[key] = domain;

  try {
    await saveToGitHub(`Add key ${key}`, token);
    showToast(`Đã thêm key: ${key}`);
    document.getElementById("newKey").value = "";
    document.getElementById("newDomain").value = "";
    await loadRepo();
  } catch (e) {
    showToast("Lưu thất bại", "error");
  }
}

function editKey(key) {
  document.getElementById("editKeyName").textContent = key;
  document.getElementById("editDomainInput").value = currentData.redirects[key] || "";
  document.getElementById("editModal").classList.add("open");
  window.currentEditingKey = key;
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("open");
}

async function saveEdit() {
  const key = window.currentEditingKey;
  const newDomain = document.getElementById("editDomainInput").value.trim();
  const token = document.getElementById("tokenInput").value.trim();

  if (!key || !newDomain || !token) return;

  currentData.redirects[key] = newDomain;

  try {
    await saveToGitHub(`Update ${key}`, token);
    showToast(`Đã cập nhật key: ${key}`);
    closeEditModal();
    await loadRepo();
  } catch (e) {
    showToast("Lưu thất bại", "error");
  }
}

async function deleteKey(key) {
  if (!confirm(`Xoá key "${key}" khỏi redirectMap?`)) return;

  const token = document.getElementById("tokenInput").value.trim();
  if (!token || !currentData) return;

  delete currentData.redirects[key];

  try {
    await saveToGitHub(`Delete key ${key}`, token);
    showToast(`Đã xoá key: ${key}`);
    await loadRepo();
  } catch (e) {
    showToast("Xoá thất bại", "error");
  }
}

async function saveToGitHub(message, token) {
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));

  const body = {
    message: message,
    content: content,
    sha: currentSha
  };

  const res = await fetch(url, {
    method: "PUT",
    headers: getHeaders(token),
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }

  const result = await res.json();
  currentSha = result.content.sha;
  return result;
}

function saveToken() {
  const token = document.getElementById("tokenInput").value.trim();
  if (token) {
    localStorage.setItem("nevoirs_github_token", token);
    showToast("Đã lưu token vào trình duyệt");
  }
}

function init() {
  // Load saved token if any
  const saved = localStorage.getItem("nevoirs_github_token");
  if (saved) {
    document.getElementById("tokenInput").value = saved;
  }

  // Auto load on start
  setTimeout(() => {
    loadRepo();
  }, 600);

  // Enter key support
  document.getElementById("newKey").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("newDomain").focus();
  });
  document.getElementById("newDomain").addEventListener("keydown", e => {
    if (e.key === "Enter") addNewKey();
  });
}

init();
</script>
</body>
</html>
