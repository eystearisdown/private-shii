<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEVOIRS • RedirectMap Control</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05020a;
  --glass: rgba(255,255,255,.07);
  --line: rgba(255,214,247,.15);
  --pink: #ff7ac8;
  --cyan: #5de0ff;
  --violet: #b38cff;
  --green: #4ade80;
  --red: #ff5371;
  --txt: #f8f1ff;
  --muted: rgba(248,241,255,.55);
}

* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: #05020a;
  color: var(--txt);
  min-height: 100vh;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: -1;
}

.container { max-width: 920px; margin: 0 auto; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
}

.logo { display: flex; align-items: center; gap: 14px; }
.logoOrb {
  width: 58px; height: 58px; border-radius: 18px;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  display: grid; place-items: center;
  font-weight: 900; font-size: 26px; color: white;
  box-shadow: 0 0 40px rgba(255,122,200,.4), inset 0 0 20px rgba(255,255,255,.3);
  transition: transform 0.3s ease;
}
.logoOrb:hover { transform: rotate(8deg) scale(1.05); }

h1 { font-size: 32px; font-weight: 800; letter-spacing: -.025em; line-height: 1; }
.subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; letter-spacing: .5px; }

.stats {
  display: flex; gap: 12px; align-items: center;
  background: var(--glass); border: 1px solid var(--line);
  padding: 8px 20px; border-radius: 999px; font-size: 13px;
}
.stat-value { font-weight: 700; color: var(--cyan); }

.tokenBar {
  display: flex; gap: 10px; align-items: center;
  background: var(--glass); border: 1px solid var(--line);
  padding: 8px 10px 8px 18px; border-radius: 999px; font-size: 13px; flex-wrap: wrap;
}
.tokenBar input {
  background: transparent; border: none; color: var(--txt);
  font-family: 'JetBrains Mono', monospace; width: 240px; outline: none; font-size: 13px;
}

.card {
  background: var(--glass); border: 1px solid var(--line);
  border-radius: 22px; padding: 24px; margin-bottom: 20px;
  box-shadow: 0 15px 50px rgba(0,0,0,.35);
  transition: border-color 0.2s ease;
}
.card:hover { border-color: rgba(93,224,255,.25); }

.sectionTitle {
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
}

.inputRow { display: flex; gap: 12px; flex-wrap: wrap; }
.inputRow input {
  flex: 1; min-width: 160px;
  background: rgba(255,255,255,.055); border: 1px solid var(--line);
  color: var(--txt); padding: 15px 18px; border-radius: 16px;
  font-size: 15px; outline: none; transition: all 0.2s ease;
}
.inputRow input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 4px rgba(93,224,255,.1);
  background: rgba(255,255,255,.08);
}

button {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-weight: 700; cursor: pointer; transition: all 0.15s cubic-bezier(0.23, 1, 0.32, 1);
  border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}

.btn {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  color: white; padding: 14px 26px; border-radius: 16px; font-size: 15px;
  box-shadow: 0 6px 25px rgba(255,122,200,.3); white-space: nowrap;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,122,200,.4); }

.btn.secondary {
  background: rgba(255,255,255,.09); color: var(--txt);
  border: 1px solid var(--line); box-shadow: none;
}
.btn.secondary:hover { background: rgba(255,255,255,.15); border-color: var(--cyan); }

.btn.danger {
  background: rgba(255,83,113,.12); color: #ffd1db;
  border: 1px solid rgba(255,83,113,.35);
}
.btn.danger:hover { background: rgba(255,83,113,.2); }

.keyList { display: grid; gap: 10px; }

.keyItem {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,.035); border: 1px solid var(--line);
  border-radius: 18px; padding: 18px 22px; transition: all 0.2s ease; gap: 16px;
}
.keyItem:hover {
  border-color: var(--cyan); background: rgba(93,224,255,.06);
  transform: translateY(-1px);
}

.keyInfo { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
.key {
  font-family: 'JetBrains Mono', monospace; font-weight: 800;
  font-size: 17px; color: var(--cyan); word-break: break-all;
}
.domain {
  font-size: 14px; color: var(--muted); word-break: break-all; line-height: 1.3;
}

.keyActions { display: flex; gap: 8px; flex-shrink: 0; }
.keyActions button { padding: 9px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; }

.emptyState { text-align: center; padding: 52px 20px; color: var(--muted); }
.emptyState .icon { font-size: 42px; margin-bottom: 12px; opacity: 0.6; }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #111; color: white; padding: 15px 26px; border-radius: 999px;
  box-shadow: 0 15px 40px rgba(0,0,0,.5); display: none; align-items: center;
  gap: 12px; z-index: 99999; font-weight: 600; font-size: 14px; max-width: 90%;
}
.toast.show { display: flex; }
.toast.success { background: #052e1f; color: #4ade80; border: 1px solid #166534; }
.toast.error { background: #2a1218; color: #ff5371; border: 1px solid #4c1d25; }

.modal {
  position: fixed; inset: 0; background: rgba(5,2,10,.9);
  display: none; align-items: center; justify-content: center;
  z-index: 99999; backdrop-filter: blur(8px);
}
.modal.open { display: flex; }

.modalContent {
  background: #10071f; border: 1px solid var(--line);
  border-radius: 24px; padding: 32px; width: 100%; max-width: 440px;
  box-shadow: 0 25px 70px rgba(0,0,0,.6);
}
.modalContent h3 { margin-bottom: 20px; font-size: 22px; font-weight: 700; }
.modalContent input {
  width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--line);
  color: var(--txt); padding: 16px 18px; border-radius: 16px; font-size: 15px;
  margin-bottom: 20px; outline: none;
}
.modalContent input:focus { border-color: var(--cyan); }

.modalActions { display: flex; gap: 12px; justify-content: flex-end; }

.searchBar { margin-bottom: 18px; }
.searchBar input {
  width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--line);
  padding: 15px 20px; border-radius: 999px; color: var(--txt); font-size: 15px; outline: none;
}
.searchBar input:focus { border-color: var(--cyan); }

@media (max-width: 640px) {
  .header { flex-direction: column; align-items: flex-start; }
  .tokenBar { width: 100%; }
  .tokenBar input { width: 100%; }
  .inputRow { flex-direction: column; }
  .keyItem { flex-direction: column; align-items: flex-start; }
  .keyActions { width: 100%; justify-content: flex-end; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logoOrb">N</div>
      <div>
        <h1>RedirectMap</h1>
        <div class="subtitle">NEVOIRS • Control Panel</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span style="color:var(--muted)">Total</span>
        <span id="totalCount" class="stat-value">0</span>
      </div>
      <div style="width:1px;height:16px;background:var(--line)"></div>
      <div class="stat">
        <span style="color:var(--muted)">Loaded</span>
        <span id="loadedCount" class="stat-value">0</span>
      </div>
    </div>
  </div>

  <!-- Token + Demo -->
  <div class="card" style="padding:18px 24px; margin-bottom:20px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div style="flex:1; min-width:220px;">
        <div style="font-size:12px; color:var(--muted); margin-bottom:4px; padding-left:4px;">GITHUB PERSONAL ACCESS TOKEN</div>
        <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" 
               style="width:100%; background:rgba(255,255,255,.04); border:1px solid var(--line); padding:12px 16px; border-radius:12px; color:var(--txt); font-family:'JetBrains Mono',monospace; font-size:13px;">
      </div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button onclick="saveToken()" class="btn secondary" style="padding:11px 20px; font-size:13px;">Lưu Token</button>
        <button onclick="useDemoMode()" class="btn secondary" style="padding:11px 20px; font-size:13px; background:rgba(93,224,255,.1); border:1px solid var(--cyan); color:var(--cyan);">Demo Mode</button>
      </div>
    </div>
  </div>

  <!-- Add New -->
  <div class="card">
    <div class="sectionTitle">THÊM KEY MỚI</div>
    <div class="inputRow">
      <input id="newKey" placeholder="Key (ví dụ: 127 hoặc home-2)" style="flex:0.55">
      <input id="newDomain" placeholder="Domain hoặc full URL" style="flex:1">
      <button onclick="addNewKey()" class="btn">+ Thêm Redirect</button>
    </div>
  </div>

  <!-- List -->
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
      <div class="sectionTitle" style="margin:0;">DANH SÁCH REDIRECTS</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button onclick="loadRepo(true)" class="btn secondary" style="padding:9px 18px; font-size:13px;">⟳ Tải lại</button>
        <button onclick="exportJSON()" class="btn secondary" style="padding:9px 18px; font-size:13px;">Export JSON</button>
      </div>
    </div>

    <div class="searchBar">
      <input id="searchInput" placeholder="Tìm kiếm theo key hoặc domain..." oninput="filterKeys()">
    </div>

    <div id="keyList" class="keyList"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modalContent">
    <h3>Chỉnh sửa <span id="editKeyName" style="color:var(--cyan)"></span></h3>
    <input id="editDomainInput" placeholder="Domain / URL mới">
    <div class="modalActions">
      <button onclick="closeEditModal()" class="btn secondary">Hủy</button>
      <button onclick="saveEdit()" class="btn">Lưu thay đổi</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div id="loadingOverlay" style="display:none; position:fixed; inset:0; background:rgba(5,2,10,0.75); z-index:99998; align-items:center; justify-content:center; backdrop-filter:blur(6px);">
  <div style="background:var(--glass); border:1px solid var(--line); border-radius:24px; padding:28px 42px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.5);">
    <div style="width:32px; height:32px; border:3px solid rgba(255,255,255,.15); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 16px;"></div>
    <div style="font-weight:700; font-size:15px;">Đang xử lý với GitHub...</div>
    <div style="font-size:12px; color:var(--muted); margin-top:6px;">Vui lòng chờ trong giây lát</div>
  </div>
</div>

<script>
// Toàn bộ JavaScript logic (giữ nguyên + cải tiến nhỏ)
const GITHUB_OWNER = "eystearisdown";
const GITHUB_REPO  = "private-shii";
const GITHUB_PATH  = "redirectMap.json";

let currentData = null;
let currentSha = null;
let allKeys = [];
let isDemoMode = false;

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.innerHTML = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove("show"), 2600);
}

function showLoading(show = true) {
  document.getElementById("loadingOverlay").style.display = show ? "flex" : "none";
}

function updateStats() {
  const total = allKeys.length;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("loadedCount").textContent = total;
}

function useDemoMode() {
  isDemoMode = true;
  currentData = {
    redirects: {
      "home": "https://nevoirs.com",
      "127": "https://nerland.co",
      "216-2": "https://shop.nerland.co",
      "blog": "https://blog.nevoirs.com",
      "demo": "https://demo.nevoirs.app",
      "status": "https://status.nevoirs.com"
    }
  };
  allKeys = Object.keys(currentData.redirects).sort();
  renderKeyList(allKeys);
  updateStats();
  showToast("Đã bật Demo Mode (dữ liệu mẫu)", "success");
}

function saveToken() {
  const token = document.getElementById("tokenInput").value.trim();
  if (token) {
    localStorage.setItem("nevoirs_github_token", token);
    showToast("Đã lưu GitHub Token");
  }
}

function renderKeyList(keysToShow) {
  const container = document.getElementById("keyList");
  container.innerHTML = "";

  if (!keysToShow || keysToShow.length === 0) {
    container.innerHTML = `<div class="emptyState"><div class="icon">📭</div><div style="font-weight:600; margin-bottom:4px;">Chưa có redirect nào</div></div>`;
    return;
  }

  keysToShow.forEach(key => {
    const domain = currentData.redirects[key] || "";
    const item = document.createElement("div");
    item.className = "keyItem";
    item.innerHTML = `
      <div class="keyInfo">
        <div class="key">${key}</div>
        <div class="domain">${domain || "<i style='opacity:0.5'>chưa có domain</i>"}</div>
      </div>
      <div class="keyActions">
        <button onclick="copyToClipboard('${key}', this)" class="btn secondary copy-btn" style="padding:8px 12px; font-size:12px;" title="Copy key">⎘</button>
        <button onclick="editKey('${key}')" class="btn secondary" style="padding:9px 16px; font-size:13px;">Sửa</button>
        <button onclick="deleteKey('${key}')" class="btn danger" style="padding:9px 16px; font-size:13px;">Xoá</button>
      </div>
    `;
    container.appendChild(item);
  });
}

function filterKeys() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) { renderKeyList(allKeys); return; }
  const filtered = allKeys.filter(k => {
    const d = (currentData.redirects[k] || "").toLowerCase();
    return k.toLowerCase().includes(q) || d.includes(q);
  });
  renderKeyList(filtered);
}

async function addNewKey() {
  const key = document.getElementById("newKey").value.trim();
  const domain = document.getElementById("newDomain").value.trim();
  if (!key || !domain) { showToast("Cần nhập cả Key và Domain", "error"); return; }
  if (!currentData) { showToast("Chưa có dữ liệu", "error"); return; }

  currentData.redirects[key] = domain;

  if (isDemoMode) {
    allKeys = Object.keys(currentData.redirects).sort();
    renderKeyList(allKeys);
    updateStats();
    showToast(`Đã thêm key: ${key} (Demo Mode)`);
    document.getElementById("newKey").value = "";
    document.getElementById("newDomain").value = "";
    return;
  }

  const token = document.getElementById("tokenInput").value.trim();
  if (!token) { showToast("Thiếu GitHub Token", "error"); return; }

  try {
    await saveToGitHub(`Add redirect key: ${key}`, token);
    showToast(`Đã thêm key: ${key}`);
    document.getElementById("newKey").value = "";
    document.getElementById("newDomain").value = "";
    await loadRepo();
  } catch (e) { showToast("Lưu thất bại", "error"); }
}

function editKey(key) {
  document.getElementById("editKeyName").textContent = key;
  document.getElementById("editDomainInput").value = currentData.redirects[key] || "";
  document.getElementById("editModal").classList.add("open");
  window.currentEditingKey = key;
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("open");
}

async function saveEdit() {
  const key = window.currentEditingKey;
  const newDomain = document.getElementById("editDomainInput").value.trim();
  if (!key || !newDomain) return;

  currentData.redirects[key] = newDomain;

  if (isDemoMode) {
    renderKeyList(allKeys);
    closeEditModal();
    showToast(`Đã cập nhật key: ${key} (Demo)`);
    return;
  }

  const token = document.getElementById("tokenInput").value.trim();
  try {
    await saveToGitHub(`Update redirect key: ${key}`, token);
    showToast(`Đã cập nhật key: ${key}`);
    closeEditModal();
    await loadRepo();
  } catch (e) { showToast("Lưu thất bại", "error"); }
}

async function deleteKey(key) {
  if (!confirm(`Xoá key "${key}"?`)) return;
  delete currentData.redirects[key];

  if (isDemoMode) {
    allKeys = allKeys.filter(k => k !== key);
    renderKeyList(allKeys);
    updateStats();
    showToast(`Đã xoá key: ${key} (Demo Mode)`);
    return;
  }

  const token = document.getElementById("tokenInput").value.trim();
  try {
    await saveToGitHub(`Delete redirect key: ${key}`, token);
    showToast(`Đã xoá key: ${key}`);
    await loadRepo();
  } catch (e) { showToast("Xoá thất bại", "error"); }
}

async function saveToGitHub(message, token) {
  showLoading(true);
  try {
    const url = `https://api.github.com/repos/\( {GITHUB_OWNER}/ \){GITHUB_REPO}/contents/${GITHUB_PATH}`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
    const body = { message, content, sha: currentSha };

    const res = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github.v3+json"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    currentSha = result.content.sha;
  } finally {
    showLoading(false);
  }
}

function copyToClipboard(text, btnElement) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btnElement.innerHTML;
    btnElement.innerHTML = "✓";
    btnElement.style.color = "var(--green)";
    setTimeout(() => {
      btnElement.innerHTML = original;
      btnElement.style.color = "";
    }, 1400);
  });
}

function exportJSON() {
  if (!currentData) return showToast("Chưa có dữ liệu", "error");
  const dataStr = JSON.stringify(currentData, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
  const link = document.createElement('a');
  link.href = dataUri;
  link.download = 'redirectMap.json';
  link.click();
  showToast("Đã export redirectMap.json");
}

function init() {
  const saved = localStorage.getItem("nevoirs_github_token");
  if (saved) document.getElementById("tokenInput").value = saved;

  setTimeout(() => {
    const token = document.getElementById("tokenInput").value.trim();
    if (token && !isDemoMode) {
      loadRepo();
    } else {
      document.getElementById("keyList").innerHTML = `
        <div class="emptyState">
          <div class="icon">🚀</div>
          <div style="font-weight:600; margin-bottom:4px;">Chào mừng đến RedirectMap Control</div>
          <div style="font-size:13px;">Dùng <strong>Demo Mode</strong> để test ngay hoặc nhập Token rồi nhấn Tải lại.</div>
        </div>`;
    }
  }, 800);

  document.getElementById("newKey").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("newDomain").focus();
  });
  document.getElementById("newDomain").addEventListener("keydown", e => {
    if (e.key === "Enter") addNewKey();
  });

  updateStats();
}

init();
</script>
</body>
</html>
