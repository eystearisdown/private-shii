<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nevoirs • RedirectMap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06030d;
  --surface: #0d0820;
  --glass: rgba(255,255,255,.07);
  --glass2: rgba(255,255,255,.04);
  --line: rgba(255,214,247,.14);
  --line2: rgba(255,214,247,.08);
  --pink: #ff7ac8;
  --cyan: #69e7ff;
  --violet: #aa88ff;
  --green: #48ffa0;
  --red: #ff5371;
  --yellow: #ffd166;
  --txt: #fff8ff;
  --muted: rgba(255,248,255,.5);
  --muted2: rgba(255,248,255,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  padding:20px 16px 80px;
  background-image:
    radial-gradient(ellipse 60% 40% at 70% 0%, rgba(170,136,255,.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 0% 80%, rgba(105,231,255,.06) 0%, transparent 50%);
}
.container{max-width:820px;margin:0 auto;}

/* ─── HEADER ─── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;gap:12px;flex-wrap:wrap;
}
.logo{display:flex;align-items:center;gap:12px;}
.logoOrb{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),var(--violet));
  display:grid;place-items:center;
  font-weight:900;font-size:20px;color:#fff;
  box-shadow:0 0 24px rgba(255,122,200,.35);
}
.logoTitle{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1;}
.logoSub{font-size:12px;color:var(--muted);margin-top:1px;letter-spacing:.02em;}

/* ─── TOKEN BAR ─── */
.tokenSection{
  display:flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--line);
  padding:8px 12px;border-radius:14px;
  flex:1;min-width:260px;max-width:420px;
}
.tokenLabel{font-size:11px;color:var(--muted);white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;}
.tokenInput{
  flex:1;background:transparent;border:none;
  color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:13px;
  outline:none;min-width:0;
}
.tokenInput::placeholder{color:var(--muted2);}
.iconBtn{
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  padding:4px;border-radius:6px;line-height:1;font-size:16px;
  transition:color .15s;flex-shrink:0;
}
.iconBtn:hover{color:var(--txt);}
.statusDot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--muted2);transition:background .3s;
}
.statusDot.ok{background:var(--green);box-shadow:0 0 6px rgba(72,255,160,.5);}
.statusDot.err{background:var(--red);}
.statusDot.loading{background:var(--yellow);animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ─── CARDS ─── */
.card{
  background:var(--glass);border:1px solid var(--line);
  border-radius:18px;padding:18px;margin-bottom:14px;
}
.cardTitle{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;
}
.cardHeader{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}

/* ─── ADD ROW ─── */
.addRow{display:flex;gap:8px;flex-wrap:wrap;}
.addRow input{
  flex:1;min-width:120px;
  background:var(--glass2);border:1px solid var(--line);
  color:var(--txt);padding:11px 14px;border-radius:11px;
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.addRow input::placeholder{color:var(--muted2);}
.addRow input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(105,231,255,.1);
}
.addRow input#newKey{flex:0 0 120px;font-family:'JetBrains Mono',monospace;}

/* ─── BUTTONS ─── */
button{font-family:'Space Grotesk',sans-serif;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn{
  background:linear-gradient(135deg,var(--pink),var(--violet));
  color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;
  box-shadow:0 3px 16px rgba(255,122,200,.22);white-space:nowrap;
}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,122,200,.32);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn.sm{padding:7px 14px;font-size:12px;border-radius:9px;}
.btn.ghost{
  background:var(--glass);color:var(--txt);
  border:1px solid var(--line);box-shadow:none;
}
.btn.ghost:hover:not(:disabled){background:rgba(255,255,255,.12);}
.btn.danger{
  background:rgba(255,83,113,.12);color:#ffb3bf;
  border:1px solid rgba(255,83,113,.25);box-shadow:none;
}
.btn.danger:hover:not(:disabled){background:rgba(255,83,113,.22);}
.btn.confirm-del{
  background:rgba(255,83,113,.25);color:#ff5371;
  border:1px solid rgba(255,83,113,.5);box-shadow:none;
  animation:shakein .2s ease;
}
@keyframes shakein{0%{transform:scale(.9);}100%{transform:scale(1);}}

/* ─── SEARCH ─── */
.searchWrap{position:relative;margin-bottom:14px;}
.searchWrap svg{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
}
#searchInput{
  width:100%;background:var(--glass2);border:1px solid var(--line);
  padding:11px 14px 11px 38px;border-radius:11px;
  color:var(--txt);font-size:14px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
#searchInput::placeholder{color:var(--muted2);}
#searchInput:focus{border-color:rgba(255,255,255,.25);}

/* ─── KEY LIST ─── */
.keyList{display:grid;gap:6px;}
.keyItem{
  display:flex;align-items:center;gap:12px;
  background:var(--glass2);border:1px solid var(--line2);
  border-radius:13px;padding:12px 14px;
  transition:border-color .12s,background .12s;
  position:relative;overflow:hidden;
}
.keyItem:hover{border-color:var(--line);background:rgba(255,255,255,.05);}
.keyItem.editing{
  border-color:var(--cyan);
  background:rgba(105,231,255,.05);
}
.keyItem.saving{opacity:.6;pointer-events:none;}
.keyItem.deleting{
  animation:slideOut .2s ease forwards;
}
@keyframes slideOut{to{opacity:0;transform:translateX(12px);height:0;padding:0;margin:0;border:0;}}

.keyChip{
  font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:14px;color:var(--cyan);
  background:rgba(105,231,255,.1);border:1px solid rgba(105,231,255,.2);
  padding:4px 10px;border-radius:7px;white-space:nowrap;flex-shrink:0;
}
.keyDomain{
  font-size:13px;color:var(--muted);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.keyDomain a{
  color:var(--muted);text-decoration:none;
  transition:color .15s;
}
.keyDomain a:hover{color:var(--txt);}
.keyActions{display:flex;gap:6px;flex-shrink:0;}

/* Inline edit */
.inlineEdit{
  display:none;flex:1;min-width:0;
  background:rgba(255,255,255,.08);border:1px solid var(--cyan);
  color:var(--txt);padding:6px 10px;border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;
}
.keyItem.editing .inlineEdit{display:flex;}
.keyItem.editing .keyDomain{display:none;}

/* ─── STATS BAR ─── */
.statsBar{
  display:flex;gap:8px;font-size:12px;color:var(--muted);
  align-items:center;flex-wrap:wrap;
}
.statPill{
  background:var(--glass2);border:1px solid var(--line2);
  padding:4px 10px;border-radius:99px;
  display:flex;align-items:center;gap:5px;
}
.statPill strong{color:var(--txt);}

/* ─── CACHE BADGE ─── */
.cacheBadge{
  font-size:11px;color:var(--muted2);
  display:flex;align-items:center;gap:4px;
}
.cacheBadge span{
  background:rgba(105,231,255,.08);border:1px solid rgba(105,231,255,.15);
  color:var(--cyan);padding:2px 8px;border-radius:99px;font-size:10px;letter-spacing:.03em;
}

/* ─── EMPTY ─── */
.emptyState{
  text-align:center;padding:40px 20px;color:var(--muted);
}
.emptyState .emptyIcon{font-size:32px;margin-bottom:8px;opacity:.4;}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:#111828;color:var(--txt);
  padding:12px 20px;border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  display:flex;align-items:center;gap:10px;z-index:9999;
  font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;border:1px solid var(--line);
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.toast.success{border-color:rgba(72,255,160,.3);color:var(--green);}
.toast.error{border-color:rgba(255,83,113,.3);color:var(--red);}
.toast.info{border-color:rgba(105,231,255,.3);color:var(--cyan);}

/* ─── LOADING OVERLAY ─── */
#loadingOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(6,3,13,.75);z-index:99998;
  align-items:center;justify-content:center;
  backdrop-filter:blur(3px);
}
.spinner{
  width:26px;height:26px;border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--cyan);border-radius:50%;
  animation:spin .75s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── MOBILE ─── */
@media(max-width:520px){
  .header{flex-direction:column;align-items:flex-start;}
  .tokenSection{max-width:100%;width:100%;}
  .addRow input#newKey{flex:0 0 90px;}
  .keyItem{flex-wrap:wrap;}
  .keyActions{width:100%;justify-content:flex-end;}
}
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logoOrb">N</div>
      <div>
        <div class="logoTitle">RedirectMap</div>
        <div class="logoSub">Nevoirs · GitHub Editor</div>
      </div>
    </div>
    <div class="tokenSection">
      <div class="statusDot" id="statusDot"></div>
      <span class="tokenLabel">Token</span>
      <input class="tokenInput" id="tokenInput" type="password" placeholder="ghp_..." spellcheck="false" autocomplete="off">
      <button class="iconBtn" id="toggleToken" title="Hiện/ẩn token" onclick="toggleTokenVis()">👁</button>
      <button class="iconBtn" title="Xoá token đã lưu" onclick="clearToken()" style="font-size:14px;">✕</button>
    </div>
  </div>

  <!-- ADD NEW KEY -->
  <div class="card">
    <div class="cardTitle">Thêm key mới</div>
    <div class="addRow">
      <input id="newKey" placeholder="Key (vd: 127)" title="Tên key">
      <input id="newDomain" placeholder="URL đích (vd: nerland.co hoặc https://...)" title="Domain hoặc URL đầy đủ">
      <button class="btn" id="addBtn" onclick="addNewKey()">+ Thêm</button>
    </div>
  </div>

  <!-- KEY LIST -->
  <div class="card">
    <div class="cardHeader">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="cardTitle" style="margin:0;">Danh sách key</div>
        <div class="statsBar" id="statsBar"></div>
      </div>
      <button class="btn ghost sm" onclick="loadRepo(true)" id="reloadBtn">↻ Tải lại</button>
    </div>

    <div class="searchWrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" placeholder="Tìm key hoặc domain...">
    </div>

    <div id="keyList" class="keyList"></div>
    <div class="cacheBadge" id="cacheBadge" style="margin-top:10px;display:none;">
      <span id="cacheTime"></span> · từ cache
    </div>
  </div>

</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <div style="font-weight:700;">Đang kết nối GitHub...</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="loadingMsg">Vui lòng chờ</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const GH_OWNER = "eystearisdown";
const GH_REPO  = "private-shii";
const GH_PATH  = "redirectMap.json";
const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;

const STORAGE_TOKEN = "nevoirs_token";
const STORAGE_CACHE = "nevoirs_cache";   // { data, sha, ts }
const CACHE_TTL_MS  = 5 * 60 * 1000;    // 5 phút – sau đó auto-refresh ngầm

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentData = null;   // parsed JSON object
let currentSha  = null;   // github blob sha
let allKeys     = [];     // sorted key array
let pendingDelKey = null; // cho double-click xoá

// ═══════════════════════════════════════════
//  TOKEN HELPERS
// ═══════════════════════════════════════════
const getToken = () => document.getElementById("tokenInput").value.trim();

function persistToken(t) {
  if (t) localStorage.setItem(STORAGE_TOKEN, t);
}

function clearToken() {
  localStorage.removeItem(STORAGE_TOKEN);
  document.getElementById("tokenInput").value = "";
  setStatus("idle");
  showToast("Đã xoá token", "info");
}

function toggleTokenVis() {
  const inp = document.getElementById("tokenInput");
  inp.type = inp.type === "password" ? "text" : "password";
}

// ═══════════════════════════════════════════
//  STATUS DOT
// ═══════════════════════════════════════════
function setStatus(state) { // "idle"|"loading"|"ok"|"err"
  const d = document.getElementById("statusDot");
  d.className = "statusDot" + (state !== "idle" ? " " + state : "");
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let _toastTimer;
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.className = "toast", 2600);
}

// ═══════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════
function setLoading(on, msg = "") {
  const el = document.getElementById("loadingOverlay");
  el.style.display = on ? "flex" : "none";
  if (msg) document.getElementById("loadingMsg").textContent = msg;
}

// ═══════════════════════════════════════════
//  CACHE
// ═══════════════════════════════════════════
function saveCache(data, sha) {
  try {
    localStorage.setItem(STORAGE_CACHE, JSON.stringify({ data, sha, ts: Date.now() }));
  } catch (_) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(STORAGE_CACHE);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}

function renderCacheBadge(ts) {
  const el = document.getElementById("cacheBadge");
  const timeEl = document.getElementById("cacheTime");
  if (!ts) { el.style.display = "none"; return; }
  const ago = Math.round((Date.now() - ts) / 1000);
  const label = ago < 60 ? `${ago}s trước` : ago < 3600 ? `${Math.round(ago/60)}p trước` : `${Math.round(ago/3600)}h trước`;
  timeEl.textContent = label;
  el.style.display = "flex";
}

// ═══════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════
function ghHeaders(token) {
  return {
    "Authorization": `Bearer ${token}`,
    "Content-Type": "application/json",
    "Accept": "application/vnd.github.v3+json"
  };
}

async function fetchFromGitHub(token) {
  const res = await fetch(`${GH_API}?t=${Date.now()}`, { headers: ghHeaders(token) });
  if (res.status === 401) throw new Error("Token không hợp lệ hoặc hết hạn");
  if (res.status === 404) throw new Error("Không tìm thấy file trên GitHub");
  if (!res.ok) throw new Error(`GitHub lỗi ${res.status}`);
  const json = await res.json();
  const content = atob(json.content.replace(/\n/g, ""));
  return { data: JSON.parse(content), sha: json.sha };
}

async function pushToGitHub(token, message) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
  const res = await fetch(GH_API, {
    method: "PUT",
    headers: ghHeaders(token),
    body: JSON.stringify({ message, content, sha: currentSha })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub lỗi ${res.status}`);
  }
  const result = await res.json();
  currentSha = result.content.sha;
  saveCache(currentData, currentSha);
  return result;
}

// ═══════════════════════════════════════════
//  LOAD REPO
// ═══════════════════════════════════════════
async function loadRepo(force = false) {
  const token = getToken();
  if (!token) {
    showToast("Nhập GitHub token trước", "error");
    return;
  }
  persistToken(token);

  // Try cache first (if not forced)
  const cache = loadCache();
  if (!force && cache && (Date.now() - cache.ts < CACHE_TTL_MS)) {
    currentData = cache.data;
    currentSha  = cache.sha;
    applyData();
    renderCacheBadge(cache.ts);
    // Background refresh
    refreshInBackground(token, cache.ts);
    return;
  }

  setLoading(true, "Đang tải redirectMap...");
  setStatus("loading");
  try {
    const { data, sha } = await fetchFromGitHub(token);
    currentData = data;
    currentSha  = sha;
    currentData.redirects = currentData.redirects || {};
    saveCache(currentData, sha);
    applyData();
    renderCacheBadge(Date.now());
    setStatus("ok");
    if (force) showToast(`Đã tải lại · ${allKeys.length} key`);
  } catch (e) {
    setStatus("err");
    showToast(e.message || "Lỗi kết nối GitHub", "error");
    // Fall back to cache even if stale
    if (cache) {
      currentData = cache.data;
      currentSha  = cache.sha;
      applyData();
      renderCacheBadge(cache.ts);
      showToast("Dùng dữ liệu cache cũ", "info");
    }
  } finally {
    setLoading(false);
  }
}

async function refreshInBackground(token, cacheTs) {
  // Only refresh if cache older than 30s
  if (Date.now() - cacheTs < 30_000) return;
  try {
    const { data, sha } = await fetchFromGitHub(token);
    currentData = data;
    currentSha  = sha;
    currentData.redirects = currentData.redirects || {};
    saveCache(currentData, sha);
    applyData();
    renderCacheBadge(Date.now());
    setStatus("ok");
  } catch (_) {}
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function applyData() {
  allKeys = Object.keys(currentData.redirects).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  renderKeyList(q ? allKeys.filter(k => matchesQuery(k, q)) : allKeys);
  updateStats();
}

function matchesQuery(k, q) {
  return k.toLowerCase().includes(q) ||
    (currentData.redirects[k] || "").toLowerCase().includes(q);
}

function updateStats() {
  const bar = document.getElementById("statsBar");
  bar.innerHTML = `<div class="statPill"><strong>${allKeys.length}</strong> key</div>`;
}

function renderKeyList(keysToShow) {
  const container = document.getElementById("keyList");
  if (!keysToShow.length) {
    container.innerHTML = `<div class="emptyState">
      <div class="emptyIcon">🗂</div>
      <div>${currentData ? "Không tìm thấy key nào" : "Chưa tải dữ liệu"}</div>
    </div>`;
    return;
  }
  // Reuse existing DOM nodes where possible
  const existing = {};
  container.querySelectorAll(".keyItem[data-key]").forEach(el => {
    existing[el.dataset.key] = el;
  });

  const frag = document.createDocumentFragment();
  keysToShow.forEach(key => {
    if (existing[key]) {
      // Update domain text in place if not editing
      const item = existing[key];
      if (!item.classList.contains("editing")) {
        const domEl = item.querySelector(".keyDomain");
        if (domEl) domEl.innerHTML = domainHTML(currentData.redirects[key] || "");
      }
      frag.appendChild(item);
      delete existing[key];
    } else {
      frag.appendChild(createKeyItem(key));
    }
  });
  container.innerHTML = "";
  container.appendChild(frag);
}

function domainHTML(domain) {
  if (!domain) return `<i style="color:var(--muted2)">chưa có domain</i>`;
  const href = domain.startsWith("http") ? domain : `https://${domain}`;
  return `<a href="${href}" target="_blank" rel="noopener" title="${domain}">${domain}</a>`;
}

function createKeyItem(key) {
  const domain = currentData.redirects[key] || "";
  const div = document.createElement("div");
  div.className = "keyItem";
  div.dataset.key = key;
  div.innerHTML = `
    <div class="keyChip">${key}</div>
    <div class="keyDomain">${domainHTML(domain)}</div>
    <input class="inlineEdit" value="${domain}" placeholder="URL mới..." spellcheck="false">
    <div class="keyActions">
      <button class="btn ghost sm edit-btn" onclick="startEdit(this,'${key}')">Sửa</button>
      <button class="btn ghost sm save-btn" style="display:none;color:var(--green);border-color:rgba(72,255,160,.3);" onclick="commitEdit(this,'${key}')">✓</button>
      <button class="btn ghost sm cancel-btn" style="display:none;" onclick="cancelEdit(this,'${key}')">✕</button>
      <button class="btn danger sm del-btn" onclick="handleDelete(this,'${key}')">Xoá</button>
    </div>`;

  // Enter / Esc on inline input
  div.querySelector(".inlineEdit").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); commitEdit(div.querySelector(".save-btn"), key); }
    if (e.key === "Escape") cancelEdit(div.querySelector(".cancel-btn"), key);
  });

  return div;
}

// ═══════════════════════════════════════════
//  INLINE EDIT
// ═══════════════════════════════════════════
function startEdit(btn, key) {
  const item = btn.closest(".keyItem");
  item.classList.add("editing");
  item.querySelector(".edit-btn").style.display = "none";
  item.querySelector(".save-btn").style.display = "";
  item.querySelector(".cancel-btn").style.display = "";
  item.querySelector(".del-btn").style.display = "none";
  const input = item.querySelector(".inlineEdit");
  input.value = currentData.redirects[key] || "";
  input.focus();
  input.select();
}

function cancelEdit(btn, key) {
  const item = btn.closest(".keyItem");
  item.classList.remove("editing");
  item.querySelector(".edit-btn").style.display = "";
  item.querySelector(".save-btn").style.display = "none";
  item.querySelector(".cancel-btn").style.display = "none";
  item.querySelector(".del-btn").style.display = "";
  pendingDelKey = null;
}

async function commitEdit(btn, key) {
  const item = btn.closest(".keyItem");
  const newDomain = item.querySelector(".inlineEdit").value.trim();
  const token = getToken();
  if (!newDomain) { showToast("URL không được để trống", "error"); return; }
  if (!token) { showToast("Cần có token", "error"); return; }
  if (newDomain === currentData.redirects[key]) { cancelEdit(btn, key); return; }

  // Optimistic update
  currentData.redirects[key] = newDomain;
  cancelEdit(btn, key);
  item.querySelector(".keyDomain").innerHTML = domainHTML(newDomain);
  item.classList.add("saving");

  try {
    await pushToGitHub(token, `Update ${key}`);
    showToast(`✓ Đã cập nhật key ${key}`);
  } catch (e) {
    showToast(e.message || "Lưu thất bại", "error");
    // Rollback
    await loadRepo(true);
  } finally {
    item.classList.remove("saving");
  }
}

// ═══════════════════════════════════════════
//  DELETE (double-confirm via re-click)
// ═══════════════════════════════════════════
function handleDelete(btn, key) {
  if (pendingDelKey === key) {
    // Second click — confirm
    deleteKey(key, btn);
    pendingDelKey = null;
    return;
  }
  // First click — arm
  if (pendingDelKey) {
    // Disarm previous
    const prev = document.querySelector(`.keyItem[data-key="${pendingDelKey}"] .del-btn`);
    if (prev) { prev.textContent = "Xoá"; prev.className = "btn danger sm del-btn"; }
  }
  pendingDelKey = key;
  btn.textContent = "Chắc chắn?";
  btn.className = "btn confirm-del sm del-btn";
  // Auto-disarm after 3s
  setTimeout(() => {
    if (pendingDelKey === key) {
      pendingDelKey = null;
      btn.textContent = "Xoá";
      btn.className = "btn danger sm del-btn";
    }
  }, 3000);
}

async function deleteKey(key, btn) {
  const token = getToken();
  if (!token || !currentData) return;

  const item = btn.closest(".keyItem");
  item.classList.add("deleting");

  // Optimistic
  delete currentData.redirects[key];
  allKeys = allKeys.filter(k => k !== key);
  updateStats();

  try {
    await pushToGitHub(token, `Delete ${key}`);
    showToast(`Đã xoá key ${key}`);
  } catch (e) {
    showToast(e.message || "Xoá thất bại", "error");
    await loadRepo(true);
  }
}

// ═══════════════════════════════════════════
//  ADD NEW KEY
// ═══════════════════════════════════════════
async function addNewKey() {
  const key    = document.getElementById("newKey").value.trim();
  const domain = document.getElementById("newDomain").value.trim();
  const token  = getToken();

  if (!key || !domain) { showToast("Nhập đủ Key và URL", "error"); return; }
  if (!token)           { showToast("Cần có token", "error"); return; }
  if (!currentData)     { showToast("Tải dữ liệu trước", "error"); return; }
  if (currentData.redirects[key] !== undefined) {
    showToast(`Key "${key}" đã tồn tại`, "error"); return;
  }

  const addBtn = document.getElementById("addBtn");
  addBtn.disabled = true;

  // Optimistic
  currentData.redirects[key] = domain;
  allKeys = Object.keys(currentData.redirects).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  document.getElementById("newKey").value = "";
  document.getElementById("newDomain").value = "";
  applyData();
  // Scroll to newly added key
  setTimeout(() => {
    const el = document.querySelector(`.keyItem[data-key="${key}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 50);

  try {
    await pushToGitHub(token, `Add key ${key}`);
    showToast(`✓ Đã thêm key ${key}`);
    updateStats();
  } catch (e) {
    showToast(e.message || "Lưu thất bại", "error");
    await loadRepo(true);
  } finally {
    addBtn.disabled = false;
  }
}

// ═══════════════════════════════════════════
//  SEARCH (debounced)
// ═══════════════════════════════════════════
let _searchTimer;
document.getElementById("searchInput").addEventListener("input", () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    if (!currentData) return;
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    renderKeyList(q ? allKeys.filter(k => matchesQuery(k, q)) : allKeys);
  }, 180);
});

// ═══════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.getElementById("newKey").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("newDomain").focus();
});
document.getElementById("newDomain").addEventListener("keydown", e => {
  if (e.key === "Enter") addNewKey();
});
document.getElementById("tokenInput").addEventListener("keydown", e => {
  if (e.key === "Enter") loadRepo(true);
  if (e.key === "Escape") e.target.blur();
});

// Close pending delete on outside click
document.addEventListener("click", e => {
  if (pendingDelKey && !e.target.classList.contains("del-btn")) {
    const prev = document.querySelector(`.keyItem[data-key="${pendingDelKey}"] .del-btn`);
    if (prev) { prev.textContent = "Xoá"; prev.className = "btn danger sm del-btn"; }
    pendingDelKey = null;
  }
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  const saved = localStorage.getItem(STORAGE_TOKEN);
  if (saved) {
    document.getElementById("tokenInput").value = saved;
    loadRepo();   // auto-load if token exists
  }
}
init();
</script>
</body>
</html>
